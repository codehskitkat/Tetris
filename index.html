<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://codehs.com/uploads/3a32d33161cd615131d133a204407fb4" />
  <title>Tetris</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    #status {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .small {
      opacity: 0.75;
      margin-top: 10px;
      font-size: 13px;
      word-break: break-all;
      max-width: 900px;
    }
  </style>
</head>
<body>
  <div id="status">Loading Tetris…</div>

<script>
  const repoBase = 'https://cdn.jsdelivr.net/gh/codehskitkat/Tetris@3d7e648/';
  const indexUrl = repoBase + 'index.html';

  // ── Firebase config — REPLACE THESE VALUES ──────────────────────────────────
  // 1. Go to https://console.firebase.google.com/
  // 2. Create a project (e.g. "tetris-sync")
  // 3. Add a Web App, copy the firebaseConfig object values below
  // 4. Enable Firestore Database (Build → Firestore Database → Create database)
  //    Choose "Start in test mode" initially, then set rules (see SETUP.md)
  // ────────────────────────────────────────────────────────────────────────────
  window.__FIREBASE_CONFIG__ = {
    apiKey:            "PASTE_YOUR_API_KEY_HERE",
    authDomain:        "PASTE_YOUR_AUTH_DOMAIN_HERE",
    projectId:         "PASTE_YOUR_PROJECT_ID_HERE",
    storageBucket:     "PASTE_YOUR_STORAGE_BUCKET_HERE",
    messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID_HERE",
    appId:             "PASTE_YOUR_APP_ID_HERE"
  };

  function forceTitle() { document.title = 'Tetris'; }

  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = src;
      s.async = false;
      s.onload = resolve;
      s.onerror = () => reject(new Error('Failed: ' + src));
      document.head.appendChild(s);
    });
  }

  function runInlineScript(code) {
    return new Promise((resolve) => {
      const s = document.createElement('script');
      s.textContent = code;
      document.head.appendChild(s);
      resolve();
    });
  }

  async function injectCloudSync() {
    // Inline the cloud-sync code so it works as a single file
    // (The full cloud-sync.js content is embedded below)
    const CLOUD_SYNC_CODE = `
(function () {
  'use strict';

  const FIREBASE_CONFIG = window.__FIREBASE_CONFIG__ || {};

  const SETTINGS_KEYS = [
    'tetris_tetromino_colors',
    'tetris_rgb_cycle_ms',
    'tetris_rgb_after_place_cycle',
    'tetris_custom_cycle_v1',
    'tetris_custom_color_presets_v1',
    'tetris_keybinds_v1',
    'tetris_opts_v1',
    'tetris_color_custom_v1',
    'tetris_fun_custom_v1',
  ];

  const SYNC_USER_KEY = 'tetris_sync_user';
  const SYNC_ETAG_KEY = 'tetris_sync_etag';
  let db = null;
  let currentUser = null;
  let syncDebounce = null;
  let isSyncing = false;

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function gatherLocalSettings() {
    const out = {};
    SETTINGS_KEYS.forEach(k => { const v = localStorage.getItem(k); if (v !== null) out[k] = v; });
    return out;
  }

  function applySettingsLocally(settings) {
    if (!settings) return;
    const _orig = localStorage.setItem.bind(localStorage);
    SETTINGS_KEYS.forEach(k => { if (k in settings) _orig(k, settings[k]); });
  }

  function userDocRef(username) {
    return db.collection('tetris_users').doc(username.toLowerCase());
  }

  async function cloudGet(username) {
    const snap = await userDocRef(username).get();
    return snap.exists ? snap.data() : null;
  }

  async function cloudSet(username, data) {
    await userDocRef(username).set(data, { merge: true });
  }

  async function signup(username, password) {
    username = username.trim().toLowerCase();
    if (!username || username.length < 3) throw new Error('Username must be at least 3 characters.');
    if (!password || password.length < 6) throw new Error('Password must be at least 6 characters.');
    if (!/^[a-z0-9_-]+$/.test(username)) throw new Error('Username can only contain letters, numbers, _ and -');
    const existing = await cloudGet(username);
    if (existing && existing.passwordHash) throw new Error('Username already taken.');
    const passwordHash = await sha256(username + ':' + password);
    const settings = gatherLocalSettings();
    await cloudSet(username, { passwordHash, settings, updatedAt: Date.now() });
    currentUser = { username, passwordHash };
    localStorage.setItem(SYNC_USER_KEY, JSON.stringify(currentUser));
    localStorage.setItem(SYNC_ETAG_KEY, String(Date.now()));
    return currentUser;
  }

  async function login(username, password) {
    username = username.trim().toLowerCase();
    const data = await cloudGet(username);
    if (!data || !data.passwordHash) throw new Error('Account not found.');
    const passwordHash = await sha256(username + ':' + password);
    if (passwordHash !== data.passwordHash) throw new Error('Wrong password.');
    currentUser = { username, passwordHash };
    localStorage.setItem(SYNC_USER_KEY, JSON.stringify(currentUser));
    if (data.settings) {
      applySettingsLocally(data.settings);
      localStorage.setItem(SYNC_ETAG_KEY, String(data.updatedAt || 0));
    }
    return { user: currentUser, settings: data.settings };
  }

  function logout() {
    currentUser = null;
    localStorage.removeItem(SYNC_USER_KEY);
    localStorage.removeItem(SYNC_ETAG_KEY);
  }

  function setStatus(code) {
    const dot = document.getElementById('tcs-dot');
    const lbl = document.getElementById('tcs-label');
    if (!dot) return;
    dot.className = 'tcs-dot-inner ' + code;
    const labels = { 'logged-out':'Cloud Sync', synced:'Synced ✓', syncing:'Syncing…', error:'Sync Error' };
    if (lbl) lbl.textContent = labels[code] || 'Cloud Sync';
  }

  async function pushSettings() {
    if (!currentUser || !db || isSyncing) return;
    isSyncing = true;
    setStatus('syncing');
    try {
      const settings = gatherLocalSettings();
      await cloudSet(currentUser.username, { settings, updatedAt: Date.now() });
      localStorage.setItem(SYNC_ETAG_KEY, String(Date.now()));
      setStatus('synced');
    } catch (e) {
      setStatus('error');
    } finally {
      isSyncing = false;
    }
  }

  function debouncedPush() {
    clearTimeout(syncDebounce);
    syncDebounce = setTimeout(pushSettings, 1500);
  }

  function watchLocalStorage() {
    const _orig = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function (key, value) {
      _orig(key, value);
      if (SETTINGS_KEYS.includes(key) && currentUser) debouncedPush();
    };
    window.addEventListener('storage', e => {
      if (SETTINGS_KEYS.includes(e.key) && currentUser) debouncedPush();
    });
  }

  const CSS = \`
    #tcs-panel { position:fixed; bottom:44px; left:10px; z-index:99999; font-family:Inter,system-ui,Arial,sans-serif; font-size:12px; color:#e2e8f0; user-select:none; }
    #tcs-bubble { display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:20px; background:rgba(6,8,12,.85); border:1px solid rgba(255,255,255,.09); backdrop-filter:blur(8px); cursor:pointer; transition:background 150ms; white-space:nowrap; }
    #tcs-bubble:hover { background:rgba(14,18,26,.95); }
    .tcs-dot-inner { width:8px; height:8px; border-radius:50%; flex-shrink:0; transition:background 300ms; }
    .tcs-dot-inner.logged-out { background:#64748b; }
    .tcs-dot-inner.synced { background:#4ade80; box-shadow:0 0 6px rgba(74,222,128,.5); }
    .tcs-dot-inner.syncing { background:#fbbf24; animation:tcs-pulse 700ms ease-in-out infinite; }
    .tcs-dot-inner.error { background:#f87171; }
    @keyframes tcs-pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    #tcs-drawer { position:absolute; bottom:calc(100% + 8px); left:0; width:278px; background:rgba(7,9,15,.97); border:1px solid rgba(255,255,255,.08); border-radius:14px; backdrop-filter:blur(12px); box-shadow:0 16px 48px rgba(0,0,0,.75); overflow:hidden; display:none; flex-direction:column; }
    #tcs-drawer.open { display:flex; }
    .tcs-head { padding:12px 14px 10px; font-weight:700; font-size:13px; border-bottom:1px solid rgba(255,255,255,.05); display:flex; align-items:center; justify-content:space-between; }
    .tcs-close { cursor:pointer; opacity:.45; font-size:15px; padding:2px 5px; border-radius:4px; }
    .tcs-close:hover { opacity:1; background:rgba(255,255,255,.08); }
    .tcs-tabs { display:flex; gap:4px; padding:10px 14px 0; }
    .tcs-tab { flex:1; padding:7px; border:none; border-bottom:2px solid transparent; border-radius:8px 8px 0 0; background:rgba(255,255,255,.04); color:rgba(255,255,255,.45); cursor:pointer; font-size:12px; font-weight:700; }
    .tcs-tab.active { background:rgba(125,211,252,.1); color:#7dd3fc; border-bottom-color:#7dd3fc; }
    .tcs-body { padding:12px 14px; display:flex; flex-direction:column; gap:9px; }
    .tcs-field { display:flex; flex-direction:column; gap:4px; }
    .tcs-label { font-size:10px; font-weight:700; opacity:.5; letter-spacing:.06em; text-transform:uppercase; }
    .tcs-input { padding:8px 10px; border-radius:8px; border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.05); color:#fff; font-size:13px; width:100%; box-sizing:border-box; outline:none; font-family:inherit; }
    .tcs-input:focus { border-color:rgba(125,211,252,.4); }
    .tcs-btn { width:100%; padding:9px; border-radius:9px; border:none; background:rgba(125,211,252,.14); color:#7dd3fc; font-size:13px; font-weight:700; cursor:pointer; transition:background 150ms; font-family:inherit; }
    .tcs-btn:hover { background:rgba(125,211,252,.24); }
    .tcs-btn:disabled { opacity:.4; cursor:default; }
    .tcs-btn.danger { background:rgba(248,113,113,.1); color:#f87171; }
    .tcs-btn.danger:hover { background:rgba(248,113,113,.2); }
    .tcs-btn.secondary { background:rgba(255,255,255,.06); color:rgba(255,255,255,.7); }
    .tcs-btn.secondary:hover { background:rgba(255,255,255,.1); }
    .tcs-msg { font-size:11px; min-height:15px; }
    .tcs-msg.err { color:#f87171; }
    .tcs-msg.ok  { color:#4ade80; }
    .tcs-user-row { display:flex; align-items:center; gap:10px; padding:9px 11px; border-radius:10px; background:rgba(74,222,128,.06); border:1px solid rgba(74,222,128,.13); }
    .tcs-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,#7dd3fc,#4ade80); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:#000; flex-shrink:0; }
    .tcs-uname { font-weight:700; font-size:13px; }
    .tcs-sub { font-size:10px; opacity:.5; margin-top:1px; }
    .tcs-divider { height:1px; background:rgba(255,255,255,.05); }
    .tcs-hint { font-size:10px; text-align:center; opacity:.4; line-height:1.5; }
  \`;

  let drawerOpen = false;
  let currentTab = 'login';

  function buildUI() {
    const style = document.createElement('style');
    style.textContent = CSS;
    document.head.appendChild(style);

    const panel = document.createElement('div');
    panel.id = 'tcs-panel';
    panel.innerHTML = \`
      <div id="tcs-drawer"><div class="tcs-head"><span>☁ Cloud Sync</span><span class="tcs-close" id="tcs-close">✕</span></div><div id="tcs-inner"></div></div>
      <div id="tcs-bubble"><div id="tcs-dot"><div class="tcs-dot-inner logged-out"></div></div><span id="tcs-label">Cloud Sync</span></div>
    \`;
    document.body.appendChild(panel);

    document.getElementById('tcs-bubble').addEventListener('click', () => {
      drawerOpen = !drawerOpen;
      document.getElementById('tcs-drawer').classList.toggle('open', drawerOpen);
      if (drawerOpen) renderInner();
    });
    document.getElementById('tcs-close').addEventListener('click', () => {
      drawerOpen = false;
      document.getElementById('tcs-drawer').classList.remove('open');
    });
  }

  function renderInner() {
    const inner = document.getElementById('tcs-inner');
    if (!inner) return;
    currentUser ? renderLoggedIn(inner) : renderAuth(inner);
  }

  function renderLoggedIn(inner) {
    const lastSync = localStorage.getItem(SYNC_ETAG_KEY);
    const lsStr = lastSync ? new Date(Number(lastSync)).toLocaleTimeString() : 'Never';
    const av = currentUser.username[0].toUpperCase();
    inner.innerHTML = \`
      <div class="tcs-body">
        <div class="tcs-user-row">
          <div class="tcs-avatar">\${av}</div>
          <div><div class="tcs-uname">\${currentUser.username}</div><div class="tcs-sub">Last sync: \${lsStr}</div></div>
        </div>
        <div class="tcs-divider"></div>
        <button class="tcs-btn" id="tcs-push">⬆&nbsp; Push settings to cloud</button>
        <button class="tcs-btn secondary" id="tcs-pull">⬇&nbsp; Pull settings from cloud</button>
        <div class="tcs-msg" id="tcs-amsg"></div>
        <div class="tcs-hint">Settings auto-sync when you change them</div>
        <div class="tcs-divider"></div>
        <button class="tcs-btn danger" id="tcs-logout">Log out</button>
      </div>
    \`;
    const msg = () => document.getElementById('tcs-amsg');

    document.getElementById('tcs-push').addEventListener('click', async () => {
      msg().className = 'tcs-msg'; msg().textContent = 'Saving…';
      try { await pushSettings(); msg().className='tcs-msg ok'; msg().textContent='✓ Saved to cloud!'; renderInner(); }
      catch(e) { msg().className='tcs-msg err'; msg().textContent=e.message; }
    });

    document.getElementById('tcs-pull').addEventListener('click', async () => {
      msg().className='tcs-msg'; msg().textContent='Loading…';
      try {
        const data = await cloudGet(currentUser.username);
        if (data && data.settings) {
          applySettingsLocally(data.settings);
          localStorage.setItem(SYNC_ETAG_KEY, String(data.updatedAt || Date.now()));
          msg().className='tcs-msg ok'; msg().textContent='✓ Loaded! Reload the page to apply.';
        } else { msg().className='tcs-msg err'; msg().textContent='No cloud settings found.'; }
      } catch(e) { msg().className='tcs-msg err'; msg().textContent=e.message; }
    });

    document.getElementById('tcs-logout').addEventListener('click', () => {
      logout(); setStatus('logged-out'); renderInner();
    });
  }

  function renderAuth(inner) {
    inner.innerHTML = \`
      <div class="tcs-tabs">
        <button class="tcs-tab \${currentTab==='login'?'active':''}" id="tcs-tlogin">Log In</button>
        <button class="tcs-tab \${currentTab==='signup'?'active':''}" id="tcs-tsignup">Sign Up</button>
      </div>
      <div class="tcs-body">
        <div class="tcs-field"><div class="tcs-label">Username</div><input class="tcs-input" id="tcs-un" type="text" placeholder="your_username" autocomplete="off" spellcheck="false" /></div>
        <div class="tcs-field"><div class="tcs-label">Password</div><input class="tcs-input" id="tcs-pw" type="password" placeholder="••••••••" autocomplete="off" /></div>
        \${currentTab==='signup' ? '<div class="tcs-field"><div class="tcs-label">Confirm Password</div><input class="tcs-input" id="tcs-pw2" type="password" placeholder="••••••••" autocomplete="off" /></div>' : ''}
        <div class="tcs-msg" id="tcs-amsg"></div>
        <button class="tcs-btn" id="tcs-auth-go">\${currentTab==='login'?'Log In':'Create Account'}</button>
        <div class="tcs-hint">\${currentTab==='signup'?'Your current settings will be saved to your new account.':'Logging in pulls your cloud settings to this device.'}</div>
      </div>
    \`;

    document.getElementById('tcs-tlogin').addEventListener('click', () => { currentTab='login'; renderInner(); });
    document.getElementById('tcs-tsignup').addEventListener('click', () => { currentTab='signup'; renderInner(); });

    const un = document.getElementById('tcs-un');
    const pw = document.getElementById('tcs-pw');
    const pw2 = document.getElementById('tcs-pw2');
    const amsg = document.getElementById('tcs-amsg');
    const goBtn = document.getElementById('tcs-auth-go');

    [un, pw, pw2].filter(Boolean).forEach(el => {
      el.addEventListener('keydown', e => e.stopPropagation());
      el.addEventListener('click',   e => e.stopPropagation());
      el.addEventListener('pointerdown', e => e.stopPropagation());
    });

    async function doAuth() {
      const username = (un.value || '').trim();
      const password = pw.value || '';
      amsg.className='tcs-msg'; amsg.textContent = currentTab==='login' ? 'Logging in…' : 'Creating account…';
      goBtn.disabled = true;
      try {
        if (currentTab === 'signup') {
          const p2 = pw2 ? pw2.value : '';
          if (password !== p2) throw new Error('Passwords do not match.');
          await signup(username, password);
          amsg.className='tcs-msg ok'; amsg.textContent='✓ Account created!';
          setStatus('synced');
        } else {
          await login(username, password);
          amsg.className='tcs-msg ok'; amsg.textContent='✓ Logged in! Reload to fully apply cloud settings.';
          setStatus('synced');
        }
        setTimeout(() => renderInner(), 1000);
      } catch(e) {
        amsg.className='tcs-msg err'; amsg.textContent = e.message || String(e);
        goBtn.disabled = false;
      }
    }

    goBtn.addEventListener('click', doAuth);
    pw.addEventListener('keydown', e => { if (e.key==='Enter') { e.stopPropagation(); doAuth(); }});
    if (pw2) pw2.addEventListener('keydown', e => { if (e.key==='Enter') { e.stopPropagation(); doAuth(); }});
  }

  async function init() {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.includes('PASTE')) {
      console.warn('[CloudSync] Firebase not configured — cloud sync disabled.');
      return;
    }
    const load = src => new Promise((res,rej) => { const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
    await load('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await load('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js');

    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();

    try {
      const saved = JSON.parse(localStorage.getItem(SYNC_USER_KEY) || 'null');
      if (saved && saved.username && saved.passwordHash) { currentUser = saved; setStatus('synced'); }
    } catch(e) {}

    buildUI();
    watchLocalStorage();

    if (currentUser) setTimeout(debouncedPush, 4000);
  }

  if (document.readyState === 'complete') { init().catch(console.error); }
  else { window.addEventListener('load', () => init().catch(console.error)); }

  window.__tetrisCloudSync = { login, logout, signup, pushSettings };
})();
`;
    await runInlineScript(CLOUD_SYNC_CODE);
  }

  async function start() {
    try {
      const response = await fetch(indexUrl, { cache: 'no-store' });
      if (!response.ok) throw new Error('HTTP ' + response.status);

      const html = await response.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');

      document.head.innerHTML = `
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png"
              href="https://codehs.com/uploads/3a32d33161cd615131d133a204407fb4">
        <title>Tetris</title>
      `;

      forceTitle();

      [...doc.querySelectorAll('style, link[rel="stylesheet"]')].forEach(el => {
        document.head.appendChild(document.adoptNode(el));
      });

      document.body.innerHTML = doc.body.innerHTML;

      const scripts = [...doc.querySelectorAll('script')];

      for (const s of scripts) {
        const src = s.getAttribute('src');
        if (src) {
          await loadScript(new URL(src, repoBase).href);
        } else if (s.textContent.trim()) {
          await runInlineScript(s.textContent);
        }
      }

      forceTitle();
      setInterval(forceTitle, 250);

      // Inject cloud sync AFTER the game has fully loaded
      await injectCloudSync();

    } catch (error) {
      document.body.innerHTML =
        '<div style="padding:40px;font-family:system-ui;color:#fff;background:#111;min-height:100vh;">' +
        '<h2>Could not load the game</h2><pre style="opacity:.7;font-size:13px;">' + String(error) + '</pre></div>';
    }
  }

  start();
</script>
</body>
</html>
